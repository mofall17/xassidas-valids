<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XassidaTrack</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap');
  :root {
    --bg:#f4f9f4; --bg2:#ffffff; --bg3:#e8f3e8;
    --surface:#edf5ed; --surface2:#dceedd;
    --border:rgba(34,120,60,0.12); --border2:rgba(34,120,60,0.25);
    --primary:#1e7a3e; --primary2:#25a050; --primary3:#2ecc71;
    --text:#0f2d1a; --text2:#4a7a5a; --text3:#8ab39a;
    --green:#1e7a3e; --green-bg:rgba(30,122,62,0.10);
    --red:#c0392b; --red-bg:rgba(192,57,43,0.10);
    --blue:#2471a3; --blue-bg:rgba(36,113,163,0.10);
    --radius:10px; --radius-lg:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}

  /* SPLASH */
  #splash{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:40px;background:radial-gradient(ellipse at 50% 40%,#c8ecd4 0%,#f4f9f4 70%);}
  .splash-logo h1{font-family:'Lora',serif;font-size:48px;font-weight:600;background:linear-gradient(135deg,#1e7a3e,#2ecc71);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;}
  .splash-logo p{color:var(--text2);font-size:13px;letter-spacing:3px;text-transform:uppercase;margin-top:8px;text-align:center;}
  .splash-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:32px;width:360px;display:flex;flex-direction:column;gap:16px;box-shadow:0 4px 24px rgba(30,122,62,0.08);}
  .splash-card h2{font-size:16px;font-weight:500;color:var(--text2);text-align:center;}
  .member-list{display:flex;flex-wrap:wrap;gap:8px;}
  .member-chip{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;transition:all .2s;color:var(--text2);}
  .member-chip:hover{border-color:var(--primary);color:var(--primary);background:var(--surface2);}
  .divider{display:flex;align-items:center;gap:12px;color:var(--text3);font-size:12px;}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

  /* INPUTS */
  input[type=text],input[type=number]{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;color:var(--text);font-family:'Sora',sans-serif;font-size:14px;width:100%;outline:none;transition:border-color .2s;}
  input[type=text]:focus,input[type=number]:focus{border-color:var(--primary);}
  input::placeholder{color:var(--text3);}
  textarea{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;color:var(--text);font-family:'Sora',sans-serif;font-size:14px;width:100%;outline:none;resize:vertical;min-height:80px;}
  textarea:focus{border-color:var(--primary);}

  /* BUTTONS */
  .btn{padding:10px 20px;border-radius:var(--radius);border:none;cursor:pointer;font-family:'Sora',sans-serif;font-size:14px;font-weight:500;transition:all .2s;}
  .btn-primary{background:var(--primary);color:#fff;}
  .btn-primary:hover{background:var(--primary2);}
  .btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2);}
  .btn-ghost:hover{border-color:var(--primary);color:var(--primary);}
  .btn-sm{padding:6px 12px;font-size:12px;border-radius:6px;}
  .btn-green{background:var(--green-bg);border:1px solid var(--green);color:var(--green);}
  .btn-green:hover{background:var(--green);color:#fff;}
  .btn-red{background:var(--red-bg);border:1px solid var(--red);color:var(--red);}
  .btn-red:hover{background:var(--red);color:#fff;}
  .btn-blue{background:var(--blue-bg);border:1px solid var(--blue);color:var(--blue);}
  .btn-blue:hover{background:var(--blue);color:#fff;}
  .remove-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:2px 6px;transition:color .2s;}
  .remove-btn:hover{color:var(--red);}

  /* APP LAYOUT */
  #app{display:none;flex-direction:column;min-height:100vh;}
  .topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(30,122,62,0.06);}
  .topbar-logo{font-family:'Lora',serif;font-size:20px;font-weight:600;color:var(--primary);flex:1;}
  .topbar-date{color:var(--text2);font-size:13px;}
  .user-badge{background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:4px 12px 4px 8px;display:flex;align-items:center;gap:8px;font-size:13px;}
  .user-avatar{width:24px;height:24px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;}
  .admin-badge{background:var(--primary);color:#fff;font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;text-transform:uppercase;}
  .nav-tabs{display:flex;gap:4px;background:var(--surface);border-radius:8px;padding:4px;}
  .nav-tab{padding:5px 14px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .2s;border:none;background:none;font-family:'Sora',sans-serif;}
  .nav-tab.active{background:var(--primary);color:#fff;}
  .nav-tab:hover:not(.active){color:var(--primary);}
  .logout-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:4px;transition:color .2s;}
  .logout-btn:hover{color:var(--red);}

  /* CONTENT */
  .content{flex:1;padding:24px;max-width:1000px;margin:0 auto;width:100%;}
  .tab-panel{display:none;}
  .tab-panel.active{display:block;}

  /* DATE NAV */
  .date-nav{display:flex;align-items:center;gap:16px;margin-bottom:24px;}
  .date-nav button{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:6px 14px;color:var(--text2);cursor:pointer;font-family:'Sora',sans-serif;font-size:13px;transition:all .2s;}
  .date-nav button:hover{border-color:var(--primary);color:var(--primary);}
  .date-display{font-family:'Lora',serif;font-size:20px;font-weight:600;color:var(--text);flex:1;text-align:center;}
  .date-display.today{color:var(--primary);}

  /* BOOK CARDS */
  .books-grid{display:flex;flex-direction:column;gap:16px;}
  .book-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:0 1px 6px rgba(30,122,62,0.04);}
  .book-header{padding:16px 20px;display:flex;align-items:flex-start;gap:16px;cursor:pointer;transition:background .2s;}
  .book-header:hover{background:var(--surface);}
  .book-cover{width:48px;height:64px;background:var(--surface2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;border:1px solid var(--border);}
  .book-info{flex:1;}
  .book-title{font-family:'Lora',serif;font-size:16px;font-weight:600;color:var(--text);margin-bottom:4px;}
  .book-author{color:var(--text2);font-size:13px;margin-bottom:8px;}
  .book-progress-bar{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-bottom:6px;}
  .book-progress-fill{height:100%;background:var(--primary);border-radius:2px;transition:width .5s;}
  .book-stats{display:flex;gap:16px;font-size:12px;color:var(--text3);}
  .book-chevron{color:var(--text3);font-size:18px;transition:transform .3s;margin-left:auto;align-self:center;}
  .book-chevron.open{transform:rotate(180deg);}

  /* PARTS */
  .parts-container{display:none;border-top:1px solid var(--border);}
  .parts-container.open{display:block;}
  .part-row{display:flex;align-items:center;gap:12px;padding:12px 20px;border-top:1px solid var(--border);transition:background .2s;}
  .part-row:hover{background:var(--surface);}
  .status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .status-dot.free{background:var(--text3);}
  .status-dot.taken{background:#e67e22;}
  .status-dot.confirmed{background:var(--green);}
  .status-dot.full{background:var(--red);}
  .part-label{width:110px;font-size:13px;color:var(--text2);flex-shrink:0;}
  .part-desc{flex:1;font-size:13px;color:var(--text);}
  .assignee-chips{display:flex;flex-wrap:wrap;gap:4px;min-width:160px;}
  .assignee-chip{background:var(--surface2);border-radius:12px;padding:3px 10px;font-size:11px;color:var(--text2);}
  .assignee-chip.me{background:rgba(30,122,62,0.12);color:var(--primary);border:1px solid rgba(30,122,62,0.3);}
  .assignee-chip.confirmed{background:var(--green-bg);color:var(--green);}
  .part-status{flex-shrink:0;display:flex;gap:6px;align-items:center;}

  /* EMPTY STATE */
  .empty-state{text-align:center;padding:60px 20px;color:var(--text3);}
  .empty-state .icon{font-size:40px;margin-bottom:12px;}
  .empty-state p{font-size:14px;}

  /* MODALS */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:28px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;display:flex;flex-direction:column;gap:16px;box-shadow:0 8px 32px rgba(30,122,62,0.12);}
  .modal h3{font-family:'Lora',serif;font-size:18px;font-weight:600;color:var(--primary);}
  .modal-row{display:flex;gap:10px;}
  .form-group{display:flex;flex-direction:column;gap:6px;flex:1;}
  .form-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;font-weight:500;}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:4px;}

  /* ADMIN */
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .section-title{font-family:'Lora',serif;font-size:18px;font-weight:600;color:var(--text);}
  .admin-card-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;display:flex;flex-direction:column;gap:14px;margin-bottom:24px;box-shadow:0 1px 6px rgba(30,122,62,0.04);}
  .parts-builder{display:flex;flex-direction:column;gap:8px;}
  .part-builder-row{display:flex;gap:8px;align-items:center;background:var(--surface);border-radius:8px;padding:8px 12px;}
  .part-builder-row span{color:var(--text3);font-size:12px;min-width:32px;}
  .book-list-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px;}
  .book-list-info{flex:1;}
  .book-list-title{font-size:14px;color:var(--text);margin-bottom:2px;}
  .book-list-meta{font-size:12px;color:var(--text3);}

  /* MEMBERS */
  .members-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;}
  .member-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;}
  .member-card.is-admin{border-color:rgba(30,122,62,0.3);background:rgba(30,122,62,0.03);}
  .member-avatar{width:48px;height:48px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;color:#fff;margin:0 auto 10px;}
  .member-name{font-size:14px;font-weight:500;color:var(--text);margin-bottom:4px;}
  .member-role{font-size:12px;color:var(--text3);}

  /* MISC */
  .deadline-bar{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;font-size:13px;}
  .deadline-bar .dl-label{color:var(--text2);}
  .deadline-bar .dl-time{color:var(--primary);font-weight:600;font-variant-numeric:tabular-nums;}
  .deadline-bar.urgent .dl-time{color:var(--red);}
  .legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;font-size:12px;color:var(--text3);}
  .legend-item{display:flex;align-items:center;gap:6px;}
  #toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:12px 18px;font-size:13px;color:var(--text);z-index:300;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,0.1);}
  #toast.show{opacity:1;transform:translateY(0);}
  #toast.success{border-color:var(--green);color:var(--green);}
  #toast.error{border-color:var(--red);color:var(--red);}
  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:3px;}
  @media(max-width:600px){
    .topbar{padding:0 12px;gap:8px;}
    .topbar-logo{font-size:16px;}
    .topbar-date{display:none;}
    .content{padding:12px;}
    .part-row{flex-wrap:wrap;}
    .nav-tab{padding:5px 8px;font-size:12px;}
    .splash-card{width:calc(100vw - 32px);}
  }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-logo">
    <h1>📖 XassidaTrack</h1>
    <p>Gestion de lecture collective</p>
  </div>
  <div class="splash-card">
    <h2>Qui es-tu ?</h2>
    <div class="member-list" id="member-chips"></div>
    <div class="divider">ou</div>
    <input type="text" id="pseudo-input" placeholder="Nouveau pseudo..." maxlength="30">
    <button class="btn btn-primary" id="btn-rejoindre">Rejoindre →</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">📖 XassidaTrack</div>
    <div class="topbar-date" id="topbar-date"></div>
    <div class="nav-tabs">
      <button class="nav-tab active" id="tab-today">Aujourd'hui</button>
      <button class="nav-tab" id="tab-members">Membres</button>
      <button class="nav-tab" id="tab-admin" style="display:none">Admin</button>
    </div>
    <div class="user-badge">
      <div class="user-avatar" id="user-avatar"></div>
      <span id="user-name-badge"></span>
      <span class="admin-badge" id="admin-badge-top" style="display:none">Admin</span>
    </div>
    <button class="logout-btn" id="btn-logout" title="Se déconnecter">⏏</button>
  </div>

  <div class="content">

    <!-- TODAY TAB -->
    <div class="tab-panel active" id="panel-today">
      <div class="deadline-bar" id="deadline-bar">
        <span class="dl-label">🕐 Délai de confirmation</span>
        <span class="dl-time" id="countdown-display">–</span>
      </div>
      <div class="date-nav">
        <button id="btn-prev-day">← Avant</button>
        <div class="date-display" id="date-display"></div>
        <button id="btn-next-day">Après →</button>
      </div>
      <div class="legend">
        <div class="legend-item"><div class="status-dot free"></div>Libre</div>
        <div class="legend-item"><div class="status-dot taken"></div>Réservé</div>
        <div class="legend-item"><div class="status-dot confirmed"></div>Confirmé</div>
        <div class="legend-item"><div class="status-dot full"></div>Complet</div>
      </div>
      <div class="books-grid" id="books-grid">
        <div class="empty-state"><div class="icon">📚</div><p>Chargement...</p></div>
      </div>
    </div>

    <!-- MEMBERS TAB -->
    <div class="tab-panel" id="panel-members">
      <div class="section-header">
        <div class="section-title">👥 Membres du groupe</div>
        <span id="members-count" style="color:var(--text3);font-size:13px"></span>
      </div>
      <div class="members-grid" id="members-grid"></div>
    </div>

    <!-- ADMIN TAB -->
    <div class="tab-panel" id="panel-admin">
      <div class="section-header"><div class="section-title">📘 Ajouter un livre</div></div>
      <div class="admin-card-box">
        <div class="modal-row">
          <div class="form-group">
            <label class="form-label">Titre *</label>
            <input type="text" id="admin-book-title" placeholder="Ex: Jazbul Quloub">
          </div>
          <div class="form-group">
            <label class="form-label">Auteur</label>
            <input type="text" id="admin-book-author" placeholder="Auteur">
          </div>
        </div>
        <div class="modal-row">
          <div class="form-group">
            <label class="form-label">Date *</label>
            <input type="text" id="admin-book-date">
          </div>
          <div class="form-group" style="max-width:100px">
            <label class="form-label">Icône</label>
            <input type="text" id="admin-book-icon" placeholder="📖" maxlength="4">
          </div>
        </div>
        <div>
          <label class="form-label" style="display:block;margin-bottom:8px">Parties</label>
          <div class="parts-builder" id="admin-parts-builder"></div>
          <button class="btn btn-ghost btn-sm" style="margin-top:8px" id="btn-add-part">+ Ajouter une partie</button>
        </div>
        <div style="display:flex;justify-content:flex-end">
          <button class="btn btn-primary" id="btn-admin-add-book">Ajouter le livre</button>
        </div>
      </div>

      <div class="section-header"><div class="section-title">📅 Livres existants</div></div>
      <div id="admin-books-list"></div>
    </div>

  </div>
</div>

<!-- MODAL RESERVE -->
<div class="modal-overlay" id="modal-reserve">
  <div class="modal">
    <h3>📌 Réserver une partie</h3>
    <p style="color:var(--text2);font-size:13px" id="reserve-info"></p>
    <div class="form-group">
      <label class="form-label">Note (optionnel)</label>
      <input type="text" id="reserve-note" placeholder="Ex: Chapitres 1-5">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="btn-reserve-cancel">Annuler</button>
      <button class="btn btn-primary" id="btn-reserve-confirm">Réserver</button>
    </div>
  </div>
</div>

<!-- MODAL CONFIRM -->
<div class="modal-overlay" id="modal-confirm">
  <div class="modal">
    <h3>✅ Confirmer la lecture</h3>
    <p style="color:var(--text2);font-size:13px" id="confirm-info"></p>
    <div class="form-group">
      <label class="form-label">Commentaire (optionnel)</label>
      <textarea id="confirm-comment" placeholder="Ton ressenti..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="btn-confirm-cancel">Annuler</button>
      <button class="btn btn-green" id="btn-confirm-ok">✓ Confirmer</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {
  getFirestore, collection, doc, getDoc, getDocs, setDoc,
  updateDoc, addDoc, deleteDoc, onSnapshot, serverTimestamp, query, where, orderBy
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCPMnfRCOV-Gn5WyCnr70fqy7LYkI6xDro",
  authDomain: "xassidasvalids.firebaseapp.com",
  projectId: "xassidasvalids",
  storageBucket: "xassidasvalids.firebasestorage.app",
  messagingSenderId: "921554278130",
  appId: "1:921554278130:web:38951124868766f48a626b"
};

const fbApp = initializeApp(firebaseConfig, 'xassidatrack');
const db    = getFirestore(fbApp);

const C_MEMBERS = 'bt_members';
const C_BOOKS   = 'bt_books';
const C_RES     = 'bt_reservations';

// ── STATE ──
let currentUser    = null;
let isAdmin        = false;
let currentDateStr = todayStr();
let booksUnsub     = null;
let renderToken    = 0;
let reserveCtx     = null;
let confirmCtx     = null;
let partFields     = [];

// ── UTILS ──
function todayStr() { return new Date().toISOString().slice(0,10); }
function dateFR(str) {
  const d = new Date(str + 'T12:00:00');
  const s = d.toLocaleDateString('fr-FR', {weekday:'long',day:'numeric',month:'long',year:'numeric'});
  return s[0].toUpperCase() + s.slice(1);
}
function initials(name) { return name.split(' ').map(p => p[0]).join('').toUpperCase().slice(0,2); }
function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show ' + type;
  setTimeout(() => t.className = '', 3000);
}
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ── INIT ──
async function init() {
  const saved = localStorage.getItem('xt_user');
  if (saved) {
    document.getElementById('splash').style.display = 'none';
    document.getElementById('app').style.display    = 'flex';
    await loginWith(saved);
    return;
  }
  try {
    const snap  = await getDocs(collection(db, C_MEMBERS));
    const chips = document.getElementById('member-chips');
    chips.innerHTML = '';
    if (snap.empty) {
      chips.innerHTML = '<p style="color:var(--text3);font-size:12px;width:100%">Aucun membre enregistré.</p>';
    } else {
      snap.forEach(d => {
        const el = document.createElement('div');
        el.className = 'member-chip';
        el.textContent = d.data().name;
        el.addEventListener('click', () => loginWith(d.data().name));
        chips.appendChild(el);
      });
    }
  } catch(e) {
    console.error('init error:', e);
    toast('Erreur Firebase : ' + e.message, 'error');
  }
}

// ── LOGIN ──
async function loginWith(name) {
  name = (name || '').trim();
  if (!name) { toast('Saisis un pseudo', 'error'); return; }
  try {
    const id   = name.toLowerCase().replace(/\s+/g, '_');
    const ref  = doc(db, C_MEMBERS, id);
    const snap = await getDoc(ref);
    if (!snap.exists()) {
      await setDoc(ref, { name, isAdmin: false, joinedAt: serverTimestamp() });
    }
    const data  = snap.exists() ? snap.data() : { name, isAdmin: false };
    currentUser = { id, name: data.name || name };
    isAdmin     = data.isAdmin || false;
    localStorage.setItem('xt_user', currentUser.name);

    document.getElementById('user-name-badge').textContent   = currentUser.name;
    document.getElementById('user-avatar').textContent       = initials(currentUser.name);
    document.getElementById('admin-badge-top').style.display = isAdmin ? 'inline' : 'none';
    document.getElementById('tab-admin').style.display       = isAdmin ? 'block'  : 'none';
    document.getElementById('splash').style.display          = 'none';
    document.getElementById('app').style.display             = 'flex';
    document.getElementById('topbar-date').textContent       = new Date().toLocaleDateString('fr-FR', {day:'numeric', month:'long'});

    updateDateDisplay();
    loadBooks();
    loadMembers();
    startCountdown();
  } catch(e) {
    console.error('login error:', e);
    toast('Erreur : ' + e.message, 'error');
  }
}

function logout() {
  if (booksUnsub) booksUnsub();
  currentUser = null; isAdmin = false;
  localStorage.removeItem('xt_user');
  document.getElementById('app').style.display    = 'none';
  document.getElementById('splash').style.display = 'flex';
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-today').classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-today').classList.add('active');
  document.getElementById('member-chips').innerHTML = '';
  init();
}

// ── TABS ──
function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'admin')   { loadAdminBooks(); document.getElementById('admin-book-date').value = currentDateStr; }
  if (name === 'members') { loadMembers(); }
}

// ── DATE ──
function changeDay(delta) {
  const d = new Date(currentDateStr + 'T12:00:00');
  d.setDate(d.getDate() + delta);
  currentDateStr = d.toISOString().slice(0, 10);
  updateDateDisplay();
  loadBooks();
}
function updateDateDisplay() {
  const el      = document.getElementById('date-display');
  const isToday = currentDateStr === todayStr();
  el.textContent = isToday ? "Aujourd'hui — " + dateFR(currentDateStr) : dateFR(currentDateStr);
  el.className   = 'date-display' + (isToday ? ' today' : '');
  const adminDate = document.getElementById('admin-book-date');
  if (adminDate) adminDate.value = currentDateStr;
}

// ── COUNTDOWN ──
function startCountdown() {
  setInterval(() => {
    const now = new Date(), end = new Date();
    end.setHours(23, 59, 59, 0);
    const diff = end - now;
    if (diff < 0) { document.getElementById('countdown-display').textContent = 'Terminé'; return; }
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    document.getElementById('countdown-display').textContent = `${h}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
    document.getElementById('deadline-bar').classList.toggle('urgent', h < 2);
  }, 1000);
}

// ── LOAD BOOKS ──
function loadBooks() {
  if (booksUnsub) booksUnsub();
  renderToken++;
  const myTok = renderToken;
  const grid  = document.getElementById('books-grid');
  grid.innerHTML = '<div class="empty-state"><div class="icon">⏳</div><p>Chargement...</p></div>';

  const q = query(collection(db, C_BOOKS), where('date', '==', currentDateStr));
  booksUnsub = onSnapshot(q, async snap => {
    if (myTok !== renderToken) return;

    // save open cards
    const openCards = new Set();
    document.querySelectorAll('.parts-container.open').forEach(el => {
      openCards.add(el.dataset.bookId);
    });

    if (snap.empty) {
      grid.innerHTML = '<div class="empty-state"><div class="icon">📚</div><p>Aucun livre programmé pour ce jour.</p></div>';
      return;
    }

    const books = [];
    for (const bDoc of snap.docs) {
      const book     = { id: bDoc.id, ...bDoc.data() };
      const pSnap    = await getDocs(collection(db, C_BOOKS, book.id, 'parts'));
      const parts    = pSnap.docs.map(p => ({ id: p.id, ...p.data() })).sort((a, b) => (a.order||0) - (b.order||0));
      const rSnap    = await getDocs(query(collection(db, C_RES), where('bookId', '==', book.id)));
      const res      = {};
      rSnap.forEach(r => {
        const d = r.data();
        if (!res[d.partId]) res[d.partId] = [];
        res[d.partId].push({ id: r.id, ...d });
      });
      books.push({ book, parts, res });
    }

    if (myTok !== renderToken) return;
    grid.innerHTML = '';
    books.forEach(({ book, parts, res }) => {
      const card = buildBookCard(book, parts, res);
      grid.appendChild(card);
      if (openCards.has(book.id)) {
        card.querySelector('.parts-container')?.classList.add('open');
        card.querySelector('.book-chevron')?.classList.add('open');
      }
    });
  }, err => {
    console.error(err);
    grid.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><p>Erreur : ' + err.message + '</p></div>';
  });
}

// ── BUILD BOOK CARD ──
function buildBookCard(book, parts, res) {
  const card = document.createElement('div');
  card.className = 'book-card';

  let confirmed = 0, taken = 0;
  parts.forEach(p => {
    const r  = res[p.id] || [];
    const my = r.find(x => x.userId === currentUser.id);
    if (my?.confirmed) confirmed++;
    else if (r.length > 0) taken++;
  });
  const pct = parts.length > 0 ? Math.round(confirmed / parts.length * 100) : 0;

  // Header
  const header = document.createElement('div');
  header.className = 'book-header';
  header.innerHTML = `
    <div class="book-cover">${book.icon || '📖'}</div>
    <div class="book-info">
      <div class="book-title">${book.title}</div>
      <div class="book-author">${book.author || ''}</div>
      <div class="book-progress-bar"><div class="book-progress-fill" style="width:${pct}%"></div></div>
      <div class="book-stats">
        <span>${confirmed}/${parts.length} confirmées</span>
        <span>·</span>
        <span>${taken} réservée${taken > 1 ? 's' : ''}</span>
      </div>
    </div>
    <div class="book-chevron">▼</div>
  `;

  // Parts container
  const partsContainer = document.createElement('div');
  partsContainer.className = 'parts-container';
  partsContainer.dataset.bookId = book.id;

  header.addEventListener('click', () => {
    partsContainer.classList.toggle('open');
    header.querySelector('.book-chevron').classList.toggle('open');
  });

  if (parts.length === 0) {
    partsContainer.innerHTML = '<div style="padding:16px 20px;color:var(--text3);font-size:13px">Aucune partie définie.</div>';
  } else {
    parts.forEach(part => {
      const r    = res[part.id] || [];
      const my   = r.find(x => x.userId === currentUser.id);
      const full = part.maxReaders > 0 && r.length >= part.maxReaders;
      const dot  = my?.confirmed ? 'confirmed' : (full ? 'full' : (r.length > 0 ? 'taken' : 'free'));

      const chips = r.map(x => `
        <div class="assignee-chip ${x.userId === currentUser.id ? 'me' : ''} ${x.confirmed ? 'confirmed' : ''}">
          ${x.userName}${x.confirmed ? ' ✓' : ''}
        </div>`).join('');

      const row = document.createElement('div');
      row.className = 'part-row';
      row.innerHTML = `
        <div class="status-dot ${dot}"></div>
        <div class="part-label">${part.label || 'Partie ' + (part.order + 1)}</div>
        <div class="part-desc">${part.description || ''}</div>
        <div class="assignee-chips">${chips}</div>
        <div class="part-status" id="act-${part.id}"></div>
      `;

      const actDiv = row.querySelector('#act-' + part.id);
      if (my) {
        if (!my.confirmed) {
          const bc = document.createElement('button');
          bc.className = 'btn btn-green btn-sm';
          bc.textContent = '✓ Confirmer';
          bc.addEventListener('click', () => openConfirmModal(part.label || 'Partie', my.id));
          const bx = document.createElement('button');
          bx.className = 'btn btn-red btn-sm';
          bx.textContent = '✕';
          bx.addEventListener('click', () => cancelRes(my.id));
          actDiv.appendChild(bc);
          actDiv.appendChild(bx);
        } else {
          actDiv.innerHTML = '<span style="color:var(--green);font-size:12px;font-weight:500">✓ Lu</span>';
        }
      } else if (!full || isAdmin) {
        const br = document.createElement('button');
        br.className = 'btn btn-blue btn-sm';
        br.textContent = 'Réserver';
        br.addEventListener('click', () => openReserveModal(book.id, book.title, part.id, part.label || 'Partie'));
        actDiv.appendChild(br);
      }
      partsContainer.appendChild(row);
    });
  }

  // Admin delete
  if (isAdmin) {
    const footer = document.createElement('div');
    footer.style.cssText = 'padding:10px 20px;border-top:1px solid var(--border)';
    const del = document.createElement('button');
    del.className = 'btn btn-red btn-sm';
    del.textContent = '🗑 Supprimer le livre';
    del.addEventListener('click', () => deleteBook(book.id));
    footer.appendChild(del);
    partsContainer.appendChild(footer);
  }

  card.appendChild(header);
  card.appendChild(partsContainer);
  return card;
}

// ── RESERVE ──
function openReserveModal(bookId, bookTitle, partId, partLabel) {
  reserveCtx = { bookId, partId };
  document.getElementById('reserve-info').textContent = `"${bookTitle}" — ${partLabel}`;
  document.getElementById('reserve-note').value = '';
  openModal('modal-reserve');
}
async function doReserve() {
  if (!reserveCtx) return;
  try {
    await addDoc(collection(db, C_RES), {
      bookId: reserveCtx.bookId, partId: reserveCtx.partId,
      userId: currentUser.id, userName: currentUser.name,
      note: document.getElementById('reserve-note').value.trim(),
      confirmed: false, date: currentDateStr, createdAt: serverTimestamp()
    });
    closeModal('modal-reserve');
    toast('Partie réservée ! 📌', 'success');
  } catch(e) { toast('Erreur : ' + e.message, 'error'); }
}

// ── CONFIRM ──
function openConfirmModal(partLabel, resId) {
  confirmCtx = { resId };
  document.getElementById('confirm-info').textContent = 'Confirmer : ' + partLabel;
  document.getElementById('confirm-comment').value = '';
  openModal('modal-confirm');
}
async function doConfirm() {
  if (!confirmCtx) return;
  try {
    await updateDoc(doc(db, C_RES, confirmCtx.resId), {
      confirmed: true, confirmedAt: serverTimestamp(),
      comment: document.getElementById('confirm-comment').value.trim()
    });
    closeModal('modal-confirm');
    toast('Lecture confirmée ! ✅', 'success');
  } catch(e) { toast('Erreur : ' + e.message, 'error'); }
}
async function cancelRes(resId) {
  if (!confirm('Annuler cette réservation ?')) return;
  try { await deleteDoc(doc(db, C_RES, resId)); toast('Réservation annulée', ''); }
  catch(e) { toast('Erreur : ' + e.message, 'error'); }
}

// ── ADMIN: PARTS BUILDER ──
function renderPartFields() {
  const container = document.getElementById('admin-parts-builder');
  if (!container) return;
  container.innerHTML = '';
  partFields.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'part-builder-row';
    row.innerHTML = `
      <span>P${i + 1}</span>
      <input type="text" placeholder="Label (ex: Partie A)" value="${p.label}" style="flex:1">
      <input type="text" placeholder="Description (ex: Pages 1–50)" value="${p.description}" style="flex:2">
      <button class="remove-btn">✕</button>
    `;
    row.querySelectorAll('input')[0].addEventListener('input', e => { partFields[i].label = e.target.value; });
    row.querySelectorAll('input')[1].addEventListener('input', e => { partFields[i].description = e.target.value; });
    row.querySelector('.remove-btn').addEventListener('click', () => { partFields.splice(i, 1); renderPartFields(); });
    container.appendChild(row);
  });
}

// ── ADMIN: ADD BOOK ──
async function adminAddBook() {
  const title = document.getElementById('admin-book-title').value.trim();
  const date  = document.getElementById('admin-book-date').value.trim();
  if (!title || !date) { toast('Titre et date requis', 'error'); return; }
  try {
    const ref = await addDoc(collection(db, C_BOOKS), {
      title,
      author:     document.getElementById('admin-book-author').value.trim(),
      date,
      icon:       document.getElementById('admin-book-icon').value.trim() || '📖',
      isProposal: false,
      createdBy:  currentUser.id,
      createdAt:  serverTimestamp()
    });
    for (let i = 0; i < partFields.length; i++) {
      await addDoc(collection(db, C_BOOKS, ref.id, 'parts'), {
        label:       partFields[i].label || `Partie ${i + 1}`,
        description: partFields[i].description || '',
        order:       i,
        maxReaders:  1
      });
    }
    document.getElementById('admin-book-title').value  = '';
    document.getElementById('admin-book-author').value = '';
    document.getElementById('admin-book-icon').value   = '';
    partFields = [];
    renderPartFields();
    toast(`"${title}" ajouté ! 📘`, 'success');
    loadAdminBooks();
    loadBooks();
  } catch(e) { toast('Erreur : ' + e.message, 'error'); }
}

// ── ADMIN: BOOK LIST ──
async function loadAdminBooks() {
  const container = document.getElementById('admin-books-list');
  container.innerHTML = '<p style="color:var(--text3);font-size:13px">Chargement...</p>';
  try {
    const snap = await getDocs(query(collection(db, C_BOOKS), orderBy('date', 'desc')));
    if (snap.empty) { container.innerHTML = '<p style="color:var(--text3);font-size:13px">Aucun livre.</p>'; return; }
    container.innerHTML = '';
    snap.forEach(d => {
      const b    = d.data();
      const item = document.createElement('div');
      item.className = 'book-list-item';
      item.innerHTML = `
        <div class="book-list-info">
          <div class="book-list-title">${b.icon || '📖'} ${b.title}</div>
          <div class="book-list-meta">📅 ${b.date} ${b.author ? '— ' + b.author : ''}</div>
        </div>
      `;
      const del = document.createElement('button');
      del.className = 'btn btn-red btn-sm';
      del.textContent = '🗑';
      del.addEventListener('click', () => deleteBook(d.id));
      item.appendChild(del);
      container.appendChild(item);
    });
  } catch(e) { container.innerHTML = '<p style="color:var(--text3)">Erreur : ' + e.message + '</p>'; }
}

async function deleteBook(id) {
  if (!confirm('Supprimer ce livre ?')) return;
  try { await deleteDoc(doc(db, C_BOOKS, id)); toast('Livre supprimé', ''); loadAdminBooks(); }
  catch(e) { toast('Erreur : ' + e.message, 'error'); }
}

// ── MEMBERS ──
async function loadMembers() {
  const grid = document.getElementById('members-grid');
  grid.innerHTML = '';
  try {
    const snap = await getDocs(collection(db, C_MEMBERS));
    document.getElementById('members-count').textContent = snap.size + ' membre' + (snap.size > 1 ? 's' : '');
    snap.forEach(d => {
      const m    = d.data();
      const card = document.createElement('div');
      card.className = 'member-card' + (m.isAdmin ? ' is-admin' : '');
      card.innerHTML = `
        <div class="member-avatar">${initials(m.name)}</div>
        <div class="member-name">${m.name} ${m.isAdmin ? '<span class="admin-badge">Admin</span>' : ''}</div>
        <div class="member-role">${m.isAdmin ? 'Administrateur' : 'Membre actif'}</div>
      `;
      grid.appendChild(card);
    });
  } catch(e) { console.error(e); }
}

// ── EVENT LISTENERS ──
document.getElementById('btn-rejoindre').addEventListener('click', () => {
  loginWith(document.getElementById('pseudo-input').value);
});
document.getElementById('pseudo-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') loginWith(document.getElementById('pseudo-input').value);
});
document.getElementById('btn-logout').addEventListener('click', logout);
document.getElementById('tab-today').addEventListener('click',   () => switchTab('today'));
document.getElementById('tab-members').addEventListener('click', () => switchTab('members'));
document.getElementById('tab-admin').addEventListener('click',   () => switchTab('admin'));
document.getElementById('btn-prev-day').addEventListener('click', () => changeDay(-1));
document.getElementById('btn-next-day').addEventListener('click', () => changeDay(1));
document.getElementById('btn-reserve-cancel').addEventListener('click',  () => closeModal('modal-reserve'));
document.getElementById('btn-reserve-confirm').addEventListener('click', doReserve);
document.getElementById('btn-confirm-cancel').addEventListener('click',  () => closeModal('modal-confirm'));
document.getElementById('btn-confirm-ok').addEventListener('click',      doConfirm);
document.getElementById('btn-add-part').addEventListener('click', () => {
  partFields.push({ label: '', description: '' });
  renderPartFields();
});
document.getElementById('btn-admin-add-book').addEventListener('click', adminAddBook);

document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
});

// ── START ──
init();
</script>
